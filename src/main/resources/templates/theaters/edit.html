<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Theater</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        h1 { color: #333; }
        form { background-color: #f9f9f9; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; margin-top: 20px; margin-right: 10px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-submit { background-color: #4CAF50; color: white; }
        .btn-cancel { background-color: #666; color: white; }
    </style>
</head>
<body>
    <h1>✏️ Edit Theater</h1>
    
    <form th:action="@{/theaters/edit}" th:object="${theater}" method="post">
        <input type="hidden" th:field="*{id}">
        
        <label for="name">Theater Name:</label>
        <input type="text" id="name" th:field="*{name}" required>
        
        <label for="capacity">Capacity (Total Seats):</label>
        <input type="number" id="capacity" th:field="*{capacity}" min="1" required>
        
        <label for="type">Theater Type:</label>
        <select id="type" th:field="*{type}" required>
            <option value="Standard">Standard</option>
            <option value="VIP">VIP</option>
            <option value="IMAX">IMAX</option>
            <option value="3D">3D</option>
        </select>
        
        <button type="submit" class="btn btn-submit">Update Theater</button>
        <a href="/theaters" class="btn btn-cancel">Cancel</a>
    </form>
</body>
</html>
