<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Booking</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        h1 { color: #333; }
        form { background-color: #f9f9f9; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; margin-top: 20px; margin-right: 10px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-submit { background-color: #FF9800; color: white; }
        .btn-cancel { background-color: #666; color: white; }
        .help-text { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🎫 Add New Booking</h1>
    
    <form th:action="@{/bookings/add}" th:object="${booking}" method="post">
        <label for="userId">User ID:</label>
        <input type="text" id="userId" th:field="*{userId}" placeholder="Copy from Users page" required>
        <div class="help-text">Tip: Go to Users page to get the user ID</div>
        
        <label for="showtimeId">Showtime ID:</label>
        <input type="text" id="showtimeId" th:field="*{showtimeId}" placeholder="Copy from Showtimes page" required>
        <div class="help-text">Tip: Go to Showtimes page to get the showtime ID</div>
        
        <label for="numberOfSeats">Number of Seats:</label>
        <input type="number" id="numberOfSeats" th:field="*{numberOfSeats}" min="1" placeholder="e.g., 2" required>
        
        <label for="seatNumbers">Seat Numbers:</label>
        <input type="text" id="seatNumbers" th:field="*{seatNumbers}" placeholder="e.g., A1, A2, A3" required>
        
        <label for="totalPrice">Total Price ($):</label>
        <input type="number" step="0.01" id="totalPrice" th:field="*{totalPrice}" placeholder="e.g., 30.00" required>
        
        <button type="submit" class="btn btn-submit">Save Booking</button>
        <a href="/bookings" class="btn btn-cancel">Cancel</a>
    </form>
</body>
</html>
