<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Movie Ticket Booking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .navbar a:hover { background: rgba(255,255,255,0.1); }
        .navbar .logo { font-size: 22px; font-weight: bold; }
        .navbar .logo span { color: #e94560; }

        .register-container {
            margin-top: 40px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .register-container h2 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .register-container .subtitle {
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            color: rgba(255,255,255,0.8);
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.3);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .login-link a {
            color: #e94560;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover { text-decoration: underline; }

        .alert-error {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            background: rgba(233,69,96,0.2);
            border: 1px solid rgba(233,69,96,0.5);
            color: #ff6b81;
        }

        .password-hint {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="logo">🎬 <span>Scope</span> Cinemas</a>
        <div>
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="register-container">
        <h2>📝 Create Account</h2>
        <p class="subtitle">Join us and start booking movies!</p>

        <!-- Error Message -->
        <div th:if="${error}" class="alert-error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post">

            <div class="form-group">
                <label>👤 Full Name</label>
                <input type="text" name="name" th:value="${name}" placeholder="Enter your full name" required/>
            </div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" name="email" th:value="${email}" placeholder="Enter your email" required/>
            </div>

            <div class="form-group">
                <label>📱 Phone Number</label>
                <input type="tel" name="phone" th:value="${phone}" placeholder="Enter your phone number" required/>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Create a password" required minlength="4"/>
                <p class="password-hint">Minimum 4 characters</p>
            </div>

            <div class="form-group">
                <label>🔒 Confirm Password</label>
                <input type="password" name="confirmPassword" placeholder="Confirm your password" required/>
            </div>

            <button type="submit" class="btn-register">Create Account →</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>

</body>
</html>
