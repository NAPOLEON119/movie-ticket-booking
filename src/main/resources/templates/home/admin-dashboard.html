<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-icon { font-size: 40px; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { color: rgba(255,255,255,0.5); font-size: 14px; text-transform: uppercase; }

        .stat-revenue .stat-value { color: #2ed573; }
        .stat-bookings .stat-value { color: #667eea; }
        .stat-movies .stat-value { color: #ffa502; }
        .stat-users .stat-value { color: #e94560; }
        .stat-theaters .stat-value { color: #a29bfe; }
        .stat-confirmed .stat-value { color: #2ed573; }
        .stat-cancelled .stat-value { color: #ff6b81; }

        .admin-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 40px;
        }

        .admin-link {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .admin-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }
        .admin-link span.icon { font-size: 24px; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav style="width:100%; background:rgba(0,0,0,0.3); padding:15px 40px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(10px); position:fixed; top:0; z-index:1000;">
        <a href="/" style="color:white; text-decoration:none; font-size:22px; font-weight:bold;">
            🎬 <span style="color:#e94560;">Scope</span> Cinemas
        </a>
        <div style="display:flex; align-items:center; gap:5px;">
            <a href="/" style="color:white; text-decoration:none; padding:8px 16px; border-radius:8px;">🏠 Customer Site</a>
            <a href="/admin/dashboard" style="color:white; text-decoration:none; padding:8px 16px; border-radius:8px; background:rgba(255,165,0,0.3);">📊 Dashboard</a>
            <span style="color:#e94560; font-weight:bold; margin:0 10px;" th:text="'👤 ' + ${loggedInUser.name}"></span>
            <a href="/logout" style="color:white; text-decoration:none; padding:8px 16px; border-radius:8px; background:rgba(233,69,96,0.2); border:1px solid #e94560;">Logout</a>
        </div>
    </nav>
    <div style="height: 70px;"></div>

    <div class="container">
        <h1 class="page-title">📊 Admin Dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card stat-revenue">
                <div class="stat-icon">💰</div>
                <div class="stat-value" th:text="'Rs. ' + ${#numbers.formatDecimal(totalRevenue, 1, 2)}"></div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card stat-bookings">
                <div class="stat-icon">🎟️</div>
                <div class="stat-value" th:text="${totalBookings}"></div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card stat-confirmed">
                <div class="stat-icon">✅</div>
                <div class="stat-value" th:text="${confirmedBookings}"></div>
                <div class="stat-label">Confirmed</div>
            </div>
            <div class="stat-card stat-cancelled">
                <div class="stat-icon">❌</div>
                <div class="stat-value" th:text="${cancelledBookings}"></div>
                <div class="stat-label">Cancelled</div>
            </div>
            <div class="stat-card stat-movies">
                <div class="stat-icon">🎬</div>
                <div class="stat-value" th:text="${totalMovies}"></div>
                <div class="stat-label">Movies</div>
            </div>
            <div class="stat-card stat-users">
                <div class="stat-icon">👥</div>
                <div class="stat-value" th:text="${totalCustomers}"></div>
                <div class="stat-label">Customers</div>
            </div>
            <div class="stat-card stat-theaters">
                <div class="stat-icon">🏢</div>
                <div class="stat-value" th:text="${totalTheaters}"></div>
                <div class="stat-label">Theaters</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" style="color: #45aaf2;" th:text="${totalShowtimes}"></div>
                <div class="stat-label">Showtimes</div>
            </div>
        </div>

        <h2 style="text-align:center; margin-bottom:20px; color:rgba(255,255,255,0.7);">⚙️ Quick Links</h2>

        <div class="admin-links">
            <a href="/movies" class="admin-link">
                <span class="icon">🎬</span> Manage Movies
            </a>
            <a href="/users" class="admin-link">
                <span class="icon">👥</span> Manage Users
            </a>
            <a href="/theaters" class="admin-link">
                <span class="icon">🏢</span> Manage Theaters
            </a>
            <a href="/showtimes" class="admin-link">
                <span class="icon">📅</span> Manage Showtimes
            </a>
            <a href="/bookings" class="admin-link">
                <span class="icon">🎟️</span> Manage Bookings
            </a>
        </div>
    </div>

</body>
</html>
