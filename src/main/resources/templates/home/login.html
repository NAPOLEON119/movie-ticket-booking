<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Ticket Booking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation */
        .navbar {
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .navbar a:hover { background: rgba(255,255,255,0.1); }
        .navbar .logo { font-size: 22px; font-weight: bold; }
        .navbar .logo span { color: #e94560; }

        /* Login Card */
        .login-container {
            margin-top: 80px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-container h2 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .login-container .subtitle {
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            color: rgba(255,255,255,0.8);
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.3);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .register-link a {
            color: #e94560;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover { text-decoration: underline; }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .alert-error {
            background: rgba(233,69,96,0.2);
            border: 1px solid rgba(233,69,96,0.5);
            color: #ff6b81;
        }
        .alert-success {
            background: rgba(46,213,115,0.2);
            border: 1px solid rgba(46,213,115,0.5);
            color: #2ed573;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="logo">🎬 <span>Scope</span> Cinemas</a>
        <div>
            <a href="/">Home</a>
            <a href="/register">Register</a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="login-container">
        <h2>🔐 Welcome Back</h2>
        <p class="subtitle">Login to book your favorite movies</p>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Success Message -->
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" name="redirect" th:value="${redirect}"/>

            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required/>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Enter your password" required/>
            </div>

            <button type="submit" class="btn-login">Login →</button>
        </form>

        <p class="register-link">
            Don't have an account? <a href="/register">Register here</a>
        </p>
    </div>

</body>
</html>
