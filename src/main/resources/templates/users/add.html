<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        h1 { color: #333; }
        form { background-color: #f9f9f9; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; margin-top: 20px; margin-right: 10px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-submit { background-color: #2196F3; color: white; }
        .btn-cancel { background-color: #666; color: white; }
    </style>
</head>
<body>
    <h1>👤 Add New User</h1>
    
    <form th:action="@{/users/add}" th:object="${user}" method="post">
        <label for="name">Full Name:</label>
        <input type="text" id="name" th:field="*{name}" required>
        
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required>
        
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" th:field="*{phone}" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" th:field="*{password}" required>
        
        <label for="role">Role:</label>
        <select id="role" th:field="*{role}" required>
            <option value="">Select Role</option>
            <option value="Admin">Admin</option>
            <option value="Customer">Customer</option>
        </select>
        
        <button type="submit" class="btn btn-submit">Save User</button>
        <a href="/users" class="btn btn-cancel">Cancel</a>
    </form>
</body>
</html>
